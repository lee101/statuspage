<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Account | statuspage.app.nz</title>
    <meta name="description" content="Manage your statuspage.app.nz account, checkout, status page, and subdomain.">
    <link rel="icon" href="/assets/logo.svg">
    <link rel="stylesheet" href="/assets/site.css">
    <script src="https://js.stripe.com/v3/" defer></script>
  </head>
  <body class="account-page">
    <header class="blog-header">
      <a class="brand" href="/"><img src="/assets/logo.svg" alt="" width="48" height="48"><span><strong>statuspage<span>.app.nz</span></strong><small>by Applied AI NZ</small></span></a>
      <nav aria-label="Account navigation"><a href="/">Home</a><a href="/customers">Customers</a><a href="/api">API</a></nav>
    </header>
    <main class="account-main">
      <section class="account-grid">
        <article class="account-box">
          <h1>Account</h1>
          <form id="auth-form">
            <div class="tabs" aria-label="Account">
              <button type="button" class="tab active" data-mode="register">Create account</button>
              <button type="button" class="tab" data-mode="login">Login</button>
            </div>
            <label>Email<input name="email" type="email" value="leepenkman@gmail.com" required></label>
            <label class="company-field">Business name<input name="company" value="Lee Penkman" required></label>
            <label>Password<input name="password" type="password" minlength="8" autocomplete="current-password" required></label>
            <button type="submit">Create account</button>
            <p id="auth-message" role="status"></p>
          </form>
          <div class="account-state" hidden>
            <strong id="account-name"></strong>
            <span id="account-email"></span>
            <button type="button" id="logout-button">Logout</button>
          </div>
        </article>

        <article class="account-box">
          <h2>Status page</h2>
          <form id="status-page-form">
            <label>Name<input name="name" value="Lee Status Page" required></label>
            <label>Slug<input name="slug" value="leepenkman" required></label>
            <label>Description<input name="description" value="Public uptime and incident updates."></label>
            <label>Website<input name="website_url" value="https://statuspage.app.nz"></label>
            <button type="submit">Create status page</button>
            <p id="status-page-message" role="status"></p>
          </form>
          <div id="status-pages-list" class="account-list"></div>
        </article>

        <article class="account-box">
          <h2>Subdomain</h2>
          <form id="domain-form">
            <label>Status page slug<input name="slug" value="leepenkman" required></label>
            <label>Subdomain<input name="subdomain" value="leepenkman" required></label>
            <button type="submit">Provision subdomain</button>
            <p id="domain-message" role="status"></p>
          </form>
          <div id="domains-list" class="account-list"></div>
        </article>

        <article class="account-box">
          <h2>Checkout</h2>
          <form id="signup-form">
            <fieldset class="billing-options">
              <legend>Billing</legend>
              <label class="billing-option">
                <input type="radio" name="plan" value="annual" checked>
                <span><strong>Annual</strong><small>$190/year</small></span>
              </label>
              <label class="billing-option">
                <input type="radio" name="plan" value="monthly">
                <span><strong>Monthly</strong><small>$19/month</small></span>
              </label>
            </fieldset>
            <label>Email<input name="email" type="email" value="leepenkman@gmail.com" required></label>
            <label>Business name<input name="company" value="Lee Penkman" required></label>
            <label>Domain<input name="domain" value="leepenkman.statuspage.app.nz"></label>
            <button type="submit">Open Stripe checkout</button>
            <p id="form-message" role="status"></p>
          </form>
        </article>
      </section>
    </main>
    <dialog id="checkout-dialog" class="checkout-dialog">
      <form method="dialog" class="checkout-dialog-bar">
        <strong>Stripe checkout</strong>
        <button type="submit" id="checkout-close">Close</button>
      </form>
      <div id="checkout-container"></div>
    </dialog>
    <script src="/assets/site.js"></script>
  </body>
</html>
